name: Проверка компиляции проекта

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Сбор исходного кода из репозитория
        uses: actions/checkout@v6

      - name: Установка Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"

      - name: Скачивание зависимостей
        run: go mod download

      - name: Компиляция проекта через go test
        run: go test ./...
